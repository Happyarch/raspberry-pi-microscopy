# Resolve microscopi.local and bare "microscopi" to the Pi's AP address.
# This file is read by the dnsmasq instance that NetworkManager spawns when
# ipv4.method=shared is active, so clients connecting to the Microscopi AP
# can reach the web UI at http://microscopi.local:8080/
address=/microscopi.local/192.168.42.1
address=/microscopi/192.168.42.1
