[video]
# backend: builtin (libcamera V4L2 encoder + libavformat MKV mux) or ffmpeg (subprocess pipe)
video_backend = builtin
# Encoding bitrate for builtin mode (bits per second)
builtin_bitrate = 5000000
# FFmpeg command used when video_backend = ffmpeg
# Available substitutions: {width} {height} {fps} {output}
# Raw YUV420 frames are written to ffmpeg's stdin (pipe:0)
ffmpeg_command = ffmpeg -f rawvideo -pix_fmt yuv420p -s {width}x{height} -r {fps} -i pipe:0 -c:v h264_v4l2m2m -b:v 5M -f matroska {output}
# Output directories (created on first use if missing)
video_dir = /home/microscopi/videos
stills_dir = /home/microscopi/stills

[camera]
camera_index = 0
fps = 30
# Initial camera state at startup.
initial_ae_enabled = true
initial_af_enabled = true
# Initial aperture f-number (cosmetic on fixed-aperture Pi cameras; 0 = show f/--)
initial_aperture = 0.0

[display]
# Fallback resolution used if no supported EDID mode is detected
fallback_width = 1280
fallback_height = 720
# Whether the center guide overlay (circle + crosshair) is shown at startup.
# Toggle at runtime with the 'c' key.
show_crosshair = false
# Aspect ratio for viewfinder resolution selection: 16:9 | 16:10 | 4:3
viewfinder_ar = 16:9
