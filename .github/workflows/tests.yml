name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev \
            libturbojpeg0-dev \
            libssl-dev \
            libsqlite3-dev

      - name: Cache gtest
        uses: actions/cache@v4
        with:
          path: build-tests/_deps
          key: gtest-v1.14.0

      - name: Configure
        run: cmake -S . -B build-tests -DBUILD_TESTS=ON -GNinja

      - name: Build
        run: cmake --build build-tests

      - name: Test
        run: ctest --test-dir build-tests --output-on-failure
